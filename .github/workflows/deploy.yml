name: Deploy to Hetzner

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SCP to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.105.242.247
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "."
          target: "/opt/hsc/games/webgl/"
          strip_components: 0
