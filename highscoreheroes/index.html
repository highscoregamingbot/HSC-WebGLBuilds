<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Highscore Heroes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
      /* DEFAULT: Overlay is ZICHTBAAR (veiligheid) */
      #orientation-overlay {
        display: flex; 
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
        font-size: 24px;
        text-align: center;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      
      /* Game container standaard VERBERGEN */
      #unity-container {
        display: none;
      }

      .rotate-icon {
        font-size: 50px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
  
    <div id="orientation-overlay">
      <div class="rotate-icon">↻</div>
      <div>Please rotate your device<br>to landscape mode to play.</div>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Highscore Heroes</div>
      </div>
    </div>
    
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");
      var orientationOverlay = document.querySelector("#orientation-overlay");

      var gameLoaded = false;

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/highscoreheroes.loader.js";
      var config = {
        dataUrl: buildUrl + "/highscoreheroes.data",
        frameworkUrl: buildUrl + "/highscoreheroes.framework.js",
        codeUrl: buildUrl + "/highscoreheroes.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Highscore Heroes",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      // ---------------------------------------------------------
      // ORIENTATIE LOGICA
      // ---------------------------------------------------------

      function checkOrientation() {
        // Gebruik Telegram viewport data indien beschikbaar, anders window
        var w = window.innerWidth;
        var h = window.innerHeight;
        
        if (window.Telegram?.WebApp?.viewportHeight) {
            h = window.Telegram.WebApp.viewportHeight;
        }

        var isLandscape = w > h;

        if (isLandscape) {
          orientationOverlay.style.display = 'none';
          container.style.display = 'block';

          if (!gameLoaded) {
            loadUnityGame();
            gameLoaded = true;
          }
        } else {
          orientationOverlay.style.display = 'flex';
          container.style.display = 'none';
        }
      }

      function loadUnityGame() {
        loadingBar.style.display = "block";
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      // Event Listeners
      window.addEventListener('load', checkOrientation);
      window.addEventListener('resize', checkOrientation);
      window.addEventListener('orientationchange', () => {
        setTimeout(checkOrientation, 200); // Korte vertraging voor iOS
      });
      
      // Specifiek voor Telegram WebApp resizes
      if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.onEvent('viewportChanged', checkOrientation);
          window.Telegram.WebApp.expand();
      }
      
      // Directe check
      checkOrientation();

    </script>
    
    <script>
    function GetTelegramParam(paramName) {
        const urlParams = new URLSearchParams(window.location.search);
        const tgWebAppParam = urlParams.get('startapp');
        if (tgWebAppParam && paramName === 'matchId') {
            try {
                const padding = '=='.substring(0, (4 - tgWebAppParam.length % 4) % 4);
                const decoded = atob(tgWebAppParam + padding);
                const data = JSON.parse(decoded);
                return data.matchId || '';
            } catch (e) { return ''; }
        }
        return '';
    }
    
    function GetMyTelegramId() {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
            return window.Telegram.WebApp.initDataUnsafe.user.id.toString();
        }
        return '';
    }
    
    function GetMyTelegramUsername() {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.username) {
            return window.Telegram.WebApp.initDataUnsafe.user.username;
        }
        return '';
    }
    
    function GetMyTelegramFirstName() {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name) {
            return window.Telegram.WebApp.initDataUnsafe.user.first_name;
        }
        return '';
    }

    function GetMyTelegramLastName() {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.last_name) {
            return window.Telegram.WebApp.initDataUnsafe.user.last_name;
        }
        return '';
    }

    window.addEventListener('load', function() {
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    });

    window.GetTelegramParam = GetTelegramParam;
    window.GetMyTelegramId = GetMyTelegramId;
    window.GetMyTelegramUsername = GetMyTelegramUsername;
    window.GetMyTelegramFirstName = GetMyTelegramFirstName;
    window.GetMyTelegramLastName = GetMyTelegramLastName;
    </script>
  </body>
</html>
